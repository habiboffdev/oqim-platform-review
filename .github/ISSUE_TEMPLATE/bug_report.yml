name: Bug Report
description: Report a bug in OQIM Business
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out the sections below to help us investigate.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system is affected?
      options:
        - Backend (API, AI brain, database)
        - Frontend (React dashboard)
        - Gateway (Telegram connection)
        - Infrastructure (Docker, deploy, CI)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severe is this bug?
      options:
        - P0 - Critical (system down, data loss)
        - P1 - High (feature broken, workaround exists)
        - P2 - Medium (degraded experience)
        - P3 - Low (cosmetic, minor annoyance)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:** Draft approval button returns 500 error.
        **Expected:** Draft should be sent to Telegram.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open conversation with customer
        2. Click "Approve" on AI draft
        3. See 500 error in console
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste error messages, stack traces, or backend logs.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Environment, browser, commit hash, or anything else helpful.

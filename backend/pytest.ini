[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --durations=20 --durations-min=0.5 --cov=app --cov-fail-under=25 --cov-report=term-missing:skip-covered -m "not stress"
filterwarnings =
    ignore::DeprecationWarning
markers =
    stress: end-to-end stress tests with real Redis; opt-in via `-m stress`
    real_llm: requires real Gemini API; gated behind OQIM_STRESS_REAL_LLM=1
    integration: requires live external services (docker-compose up); opt-in via `-m integration`
